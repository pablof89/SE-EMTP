    if(aid){ const a=findNode(aid); if(a){ a.children.push(node); closeModal(); saveData(); renderAll(); return; } }
    else if(pid){ const p=findNode(pid); if(p){ p.children.push(node); closeModal(); saveData(); renderAll(); return; } }
  }
  data.push(node); closeModal(); saveData(); renderAll();
}

window.openEditModal = function(id) {
  const n=findNode(id); if(!n) return;
  initRespWidget(n.responsibles||[], n.support||[]);
  const readOnly = !canEdit;
  showModal(`<h3>${readOnly?'Ver':'Editar'}: ${typeBadge(n.type)} ${n.type}</h3>
    <div class="form-row"><label>Nombre</label><input id="m-name" value="${n.name.replace(/"/g,'&quot;')}" ${readOnly?'readonly':''}></div>
    <div class="form-row"><label>Notas</label><textarea id="m-notes" ${readOnly?'readonly':''}>${n.notes||''}</textarea></div>
    <div class="form-row"><label>Responsable(s)</label>${getRespWidgetHTML('responsibles')}</div>
    <div class="form-row"><label>Apoyo</label>${getRespWidgetHTML('support')}</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      ${!readOnly?`<button class="btn btn-primary" onclick="saveEdit('${id}')"><i class="fas fa-save"></i> Guardar</button>`:''}
    </div>`);
};
window.saveEdit = function(id) {
  if(!canEdit) return;
  const n=findNode(id); if(!n) return;
  n.name=document.getElementById('m-name').value.trim();
  n.notes=document.getElementById('m-notes').value.trim();
  n.responsibles=[...window._mTeam.responsibles];
  n.support=[...window._mTeam.support];
  closeModal(); saveData(); renderAll();
};

window.openDepsModal = function(id) {
  if(!canEdit) return;
  const target=findNode(id); if(!target) return;
  const allNodes=getAllNodes(data), descendants=[];
  getAllNodes([target],descendants);
  const descendantIds=descendants.map(d=>d.id);
  let html=`<h3>Dependencias de: <span style="font-size:14px;font-weight:400;color:var(--text2)">${target.name}</span></h3>
    <p style="font-size:13px;color:var(--text3);margin-bottom:12px">Este elemento no comenzará hasta que los marcados estén Completados.</p>
    <div class="checkbox-list" id="depList">`;
  allNodes.forEach(n=>{
    if(!descendantIds.includes(n.id)&&n.id!==target.id){
      const isChecked=(target.deps||[]).includes(n.id)?'checked':'';
      html+=`<label class="checkbox-item"><input type="checkbox" value="${n.id}" ${isChecked}><span>${typeBadge(n.type)} ${n.name}</span></label>`;
    }
  });
  html+=`</div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveDeps('${id}')">Guardar</button></div>`;
  showModal(html);
};
window.saveDeps = function(id) {
  const target=findNode(id); if(!target) return;
  const checks=document.querySelectorAll('#depList input[type="checkbox"]:checked');
  target.deps=Array.from(checks).map(c=>c.value);
  closeModal(); saveData(); renderAll();
};

// ── EQUIPOS ───────────────────────────────────────────────────────────
function openTeamsModal() {
  let html=`<h3>Gestión de Equipos</h3>`;
  if(!Object.keys(teams).length) {
    html+=`<div class="empty" style="padding:20px">Sin equipos creados aún.</div>`;
  } else {
    html+=`<div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius)">`;
    Object.keys(teams).forEach(id=>{
      const t=teams[id];
      html+=`<div class="user-list-item"><div><div style="font-weight:500">${t.name}</div><div style="font-size:11px;color:var(--text3)">${t.description||''}</div></div>
        ${canEdit?`<button class="btn btn-danger btn-sm" onclick="deleteTeam('${id}')"><i class="fas fa-trash"></i></button>`:''}
      </div>`;
    });
    html+=`</div>`;
  }
  if(canEdit) {
    html+=`<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px">
      <div class="form-row"><label>Nombre del nuevo equipo</label><input id="m-team-name" placeholder="Ej: Equipo Curricular"></div>
      <div class="form-row"><label>Descripción (opcional)</label><input id="m-team-desc" placeholder=""></div>
    </div>`;
  }
  html+=`<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>${canEdit?`<button class="btn btn-primary" onclick="addTeam()"><i class="fas fa-plus"></i> Crear Equipo</button>`:''}</div>`;
  showModal(html);
}
window.addTeam = function() {
  const name=document.getElementById('m-team-name').value.trim();
  if(!name) return;
  const id='t'+Date.now().toString(36);
  teams[id]={ name, description:document.getElementById('m-team-desc').value.trim() };
  saveData(); openTeamsModal(); showToast('Equipo creado', 'success');
};
window.deleteTeam = function(id) {
  if(!confirm(`¿Eliminar el equipo "${teams[id].name}"?`)) return;
  delete teams[id];
  Object.values(users).forEach(u=>{ if(u.team===id) u.team=''; });
  saveData(); openTeamsModal(); showToast('Equipo eliminado');
};

// ── EXPORTAR ──────────────────────────────────────────────────────────
function exportCSV() {
  const all=getAllNodes(data);
  const hdr=['Tipo','Nombre','Inicio','Fin','Horas','Responsables','Apoyo','Estado','Avance(%)'];
  const rows=all.map(n=>[
    n.type, `"${n.name}"`, n.start||'', n.end||'', n.hours||0,
    `"${(n.responsibles||[]).join('; ')}"`, `"${(n.support||[]).join('; ')}"`,
    n.status, n.type!=='tarea'?pctDone([n]):''
  ].join(','));
  const b=new Blob(['\uFEFF'+[hdr.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`tablero_emtp_${today()}.csv`; a.click();
}

function exportXLSX() {
  if(typeof XLSX === 'undefined') { showToast('Librería Excel no disponible. Intenta recargar la página.', 'error'); return; }
  const all=getAllNodes(data);
  const wsData=[
    ['Tipo','Nombre','Proyecto','Inicio','Fin','Horas','Responsables','Apoyo','Estado','Avance(%)','Notas'],
    ...all.map(n=>{
      const proj = n.type==='proyecto' ? n.name : (() => { let p=findParentOfNode(n.id); while(p){ if(p.type==='proyecto') return p.name; p=findParentOfNode(p.id); } return ''; })();
      return [
        typeLabel(n.type), n.name, proj, n.start||'', n.end||'', n.hours||0,
        (n.responsibles||[]).join('; '), (n.support||[]).join('; '),
        n.status, n.type!=='tarea'?pctDone([n]):'', n.notes||''
      ];
    })
  ];
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  // Anchos de columna
  ws['!cols']=[{wch:12},{wch:40},{wch:25},{wch:12},{wch:12},{wch:8},{wch:30},{wch:20},{wch:12},{wch:10},{wch:40}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,'Tablero EMTP',ws);
  // Hoja de resumen
  const summary=[
    ['RESUMEN TABLERO SE EMTP',''],
    ['Fecha de exportación', new Date().toLocaleDateString('es-CL')],
    [''],
    ['Proyectos', data.filter(n=>n.type==='proyecto').length],
    ['Actividades', all.filter(n=>n.type==='actividad').length],
    ['Tareas', all.filter(n=>n.type==='tarea').length],
    ['Avance global (%)', pctDone()],
    ['Tareas completadas', all.filter(n=>n.type==='tarea'&&n.status==='Completado').length],
    ['Tareas vencidas', all.filter(n=>n.type==='tarea'&&isOverdue(n)).length],
    ['Horas totales', all.reduce((s,n)=>s+(n.hours||0),0)]
  ];
  const ws2=XLSX.utils.aoa_to_sheet(summary);
  ws2['!cols']=[{wch:25},{wch:20}];
  XLSX.utils.book_append_sheet(wb,'Resumen',ws2);
  XLSX.writeFile(wb,`tablero_emtp_${today()}.xlsx`);
  showToast('Excel exportado correctamente', 'success');
}
